server:
  port: 8080
  forward-headers-strategy: FRAMEWORK
spring:
  application:
    customConfigs:
      constants:
        applicationEmail: ${MAIL_USERNAME}
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: k-vashalomidze
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope: openid, profile, email, roles
        provider:
          keycloak:
            issuer-uri: https://keycloak.kosta-server.org/realms/homelab
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
