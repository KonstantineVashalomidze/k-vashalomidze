server:
  port: 8080
  forward-headers-strategy: FRAMEWORK
spring:
  application:
    customConfigs:
      constants:
        applicationEmail: ${MAIL_USERNAME}
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: portfolio
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope: openid, profile, email, roles
        provider:
          keycloak:
            issuer-uri: https://keycloak.kosta-server.org/realms/homelab
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  management:
    endpoints:
      web:
        exposure:
          include: health  # Only expose health, nothing else
    endpoint:
      health:
        show-details: never  # Don't show internal details publicly


app:
  upload-dir: ${APP_UPLOAD_DIR:}

