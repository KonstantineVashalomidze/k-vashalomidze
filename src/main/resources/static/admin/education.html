<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../css/style.css">
    <title>Manage Education</title>
</head>
<body>
    <h1>Manage Education</h1>

    <nav>
        <a href="index.html">Admin Dashboard</a>
        <a href="profile.html">Manage Profile</a>
        <a href="education.html">Manage Education</a>
        <a href="resumes.html">Manage Resumes</a>
        <a href="subscribers.html">Manage Subscribers</a>
        <a href="posts.html">Manage Posts</a>
    </nav>

    <h2>Add New</h2>
    <input id="title" type="text" placeholder="Title" /><br/>
    <input id="instituteName" type="text" placeholder="Institute Name" /><br/>
    <input id="instituteUrl" type="text" placeholder="Institute URL" /><br/>
    <input id="startDate" type="date" /><br/>
    <input id="endDate" type="date" /><br/>
    <textarea id="description" placeholder="Description"></textarea><br/>
    <input id="logo" type="file" accept="image/*" /><br/>
    <button onclick="addEducation()">Add</button>

    <h2>Existing</h2>
    <div id="list"></div>

    <script>
        async function load() {
            const res = await fetch('/api/v1/public/profile');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.education.map(e => `
            <div class="card">
              <img src="/uploads/${e.logoFilePath}" onerror="this.style.display='none'" />
              <div>
                <strong>${e.title}</strong> — ${e.instituteName}<br/>
                ${e.startDate} – ${e.endDate || 'Present'}<br/>
                <button onclick="deleteEducation(${e.id})">Delete</button>
              </div>
            </div>
          `).join('');
        }

        async function addEducation() {
            const form = new FormData();
            form.append('title', document.getElementById('title').value);
            form.append('instituteName', document.getElementById('instituteName').value);
            form.append('instituteUrl', document.getElementById('instituteUrl').value);
            form.append('startDate', document.getElementById('startDate').value);
            form.append('endDate', document.getElementById('endDate').value);
            form.append('description', document.getElementById('description').value);
            const logo = document.getElementById('logo').files[0];
            if (logo) form.append('logo', logo);

            await fetch('/api/v1/admin/education', { method: 'POST', body: form });
            load();
        }

        async function deleteEducation(id) {
            await fetch('/api/v1/admin/education/' + id, { method: 'DELETE' });
            load();
        }

        load();
    </script>

</body>
</html>
