<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../css/style.css">
    <title>Manage Profile</title>
</head>
<body>
    <h1>Manage Profile</h1>

    <nav>
        <a href="index.html">Admin Dashboard</a>
        <a href="profile.html">Manage Profile</a>
        <a href="education.html">Manage Education</a>
        <a href="resumes.html">Manage Resumes</a>
        <a href="subscribers.html">Manage Subscribers</a>
    </nav>


    <form id="profile-form">
        <input id="name" type="text" placeholder="Name" /><br/>
        <input id="profession" type="text" placeholder="Profession" /><br/>
        <textarea id="aboutMe" placeholder="About Me"></textarea><br/>
        <input id="image" type="file" accept="image/*" /><br/>
        <button type="button" onclick="saveProfile()">Save</button>
    </form>

    <script>
        async function loadProfile() {
            const res = await fetch('/api/v1/public/profile');
            const data = await res.json();
            const p = data.profile;
            document.getElementById('name').value = p.name;
            document.getElementById('profession').value = p.profession;
            document.getElementById('aboutMe').value = p.aboutMe;
        }

        async function saveProfile() {
            const form = new FormData();
            form.append('name', document.getElementById('name').value);
            form.append('profession', document.getElementById('profession').value);
            form.append('aboutMe', document.getElementById('aboutMe').value);
            const image = document.getElementById('image').files[0];
            if (image) form.append('image', image);

            await fetch('/api/v1/admin/profile', {
                method: 'PUT',
                body: form
            });
            alert('Saved!');
        }

        loadProfile();
    </script>

</body>
</html>
