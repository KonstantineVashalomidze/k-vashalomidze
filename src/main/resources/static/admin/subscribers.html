<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">

          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">

</head>
<body>
<h1>Manage Subscribers</h1>
<nav>
    <a href="index.html">Admin Dashboard</a>
    <a href="profile.html">Manage Profile</a>
    <a href="education.html">Manage Education</a>

    <a href="contacts.html">Manage Contacts</a>
</nav>

<div id="list"></div>


<h2>Send Email to All</h2>
<textarea id="emailText" placeholder="Email content..."></textarea><br/>
<button onclick="sendEmail()">Send</button>
<p id="msg"></p>

<script>
    async function load() {
        const res = await fetch('/api/v1/admin/subscribers');
        const data = await res.json();
        document.getElementById('list').innerHTML = data.map(s => `
        <div class="card">
          <p>${s.email} — <small>${new Date(s.subscribedAt).toLocaleDateString()}</small></p>
        </div>
      `).join('');
    }

    async function sendEmail() {
        const yes = confirm("Are you sure?")
        if (yes) {
            const text = document.getElementById('emailText').value;
            const res = await fetch('/api/v1/admin/subscribers/email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            if (res.status === 201) {
                alert("Successfully Sent!");
            } else {
                alert("Failed to Send!");
            }
        }
    }

    load();
</script>

</body>
</html>
