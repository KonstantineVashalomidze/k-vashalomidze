<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../css/style.css">
    <title>Admin Dashboard</title>
</head>
<body>

    <h1>Admin Dashboard</h1>

    <nav>
        <a href="index.html">Admin Dashboard</a>
        <a href="profile.html">Manage Profile</a>
        <a href="education.html">Manage Education</a>
        <a href="resumes.html">Manage Resumes</a>
        <a href="subscribers.html">Manage Subscribers</a>
    </nav>

    <section id="stats">
        <h2>Overview</h2>
        <p>Charisma count: <span id="charisma"></span></p>
        <p>Total subscribers: <span id="subscribers"></span></p>
    </section>

    <a href="/logout">Logout</a>
    <script>
        async function loadStats() {
            const res = await fetch('/api/v1/public/profile');
            const data = await res.json();
            document.getElementById('charisma').textContent = data.profile.charismaCount;
            document.getElementById('subscribers').textContent = data.subscribers.length;
        }
        loadStats();
    </script>

</body>
</html>
